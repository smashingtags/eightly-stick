<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight.ly Forge</title>
<style>
  :root {
    --bg: #0a0b0f;
    --panel: #131419;
    --panel-2: #1a1b22;
    --border: #262730;
    --border-strong: #353744;
    --text: #e7e7ea;
    --text-dim: #9093a0;
    --text-faint: #5e626f;
    --accent: #ff8c1a;
    --accent-2: #ff6b35;
    --accent-dim: rgba(255, 140, 26, 0.14);
    --user-bg: #1d1e26;
    --assistant-bg: transparent;
    --danger: #ef4444;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
  }

  ::selection { background: var(--accent-dim); color: var(--text); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #4a4d5a; }

  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: 100vh;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-width: 0;
  }
  .brand {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .brand-mark {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center;
    font-weight: 800; font-size: 14px;
    color: #1a0f06;
    letter-spacing: -0.5px;
  }
  .brand-name {
    font-weight: 700; font-size: 15px; letter-spacing: -0.2px;
  }
  .brand-name .tld { color: var(--accent); }

  .new-chat {
    margin: 12px;
    padding: 10px 14px;
    background: var(--accent);
    color: #1a0f06;
    font-weight: 600;
    border: 0; border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: transform .06s, background .1s;
  }
  .new-chat:hover { background: var(--accent-2); }
  .new-chat:active { transform: translateY(1px); }

  .chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px 12px;
  }
  .chat-item {
    padding: 9px 12px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    position: relative;
    user-select: none;
  }
  .chat-item:hover { background: var(--panel-2); color: var(--text); }
  .chat-item.active { background: var(--accent-dim); color: var(--text); }
  .chat-item .del {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    opacity: 0; width: 20px; height: 20px;
    display: grid; place-items: center;
    border-radius: 4px;
    color: var(--text-faint);
    transition: opacity .1s;
  }
  .chat-item:hover .del { opacity: 1; }
  .chat-item .del:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

  .sidebar-footer {
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    font-size: 11px;
    color: var(--text-faint);
    display: flex; justify-content: space-between; align-items: center;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #2b8a3e; display: inline-block; margin-right: 6px; }
  .status-dot.off { background: var(--danger); }

  /* ---------- Main area ---------- */
  .main {
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-width: 0;
    min-height: 0;
    background: var(--bg);
  }

  .topbar {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    background: var(--bg);
  }
  .model-picker {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    min-width: 240px;
  }
  .model-picker:focus { outline: none; border-color: var(--accent); }

  .topbar .spacer { flex: 1; }
  .icon-btn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--border-strong); }

  /* ---------- Messages ---------- */
  .messages {
    overflow-y: auto;
    overflow-x: hidden;
    min-height: 0;
    padding: 28px 0;
  }
  .message-wrap {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 24px 24px;
  }
  .message {
    display: flex; gap: 12px;
    margin-bottom: 20px;
  }
  .avatar {
    flex: 0 0 28px; height: 28px;
    border-radius: 6px;
    display: grid; place-items: center;
    font-size: 11px; font-weight: 700;
    color: var(--text);
  }
  .avatar.user { background: #374151; color: #e5e7eb; }
  .avatar.assistant {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #1a0f06;
  }
  .bubble { flex: 1; min-width: 0; }
  .role-label {
    font-size: 12px; font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .content {
    white-space: pre-wrap;
    word-wrap: break-word;
    color: var(--text);
  }
  .content pre {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    overflow-x: auto;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px;
  }
  .content code {
    background: var(--panel-2);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12.5px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
  }
  .content pre code { background: transparent; padding: 0; }
  .content h3, .content h4, .content h5 {
    margin: 16px 0 6px;
    font-weight: 600;
    line-height: 1.3;
  }
  .content h3 { font-size: 18px; }
  .content h4 { font-size: 16px; }
  .content h5 { font-size: 14px; color: var(--text-dim); }
  .content ul, .content ol { margin: 6px 0 6px 20px; padding: 0; }
  .content li { margin: 2px 0; }
  .content strong { font-weight: 600; color: var(--text); }
  .content em { font-style: italic; }
  .content details.thinking {
    margin: 4px 0 10px;
    padding: 8px 12px;
    background: var(--panel-2);
    border-left: 2px solid var(--border-strong);
    border-radius: 4px;
    color: var(--text-dim);
    font-size: 13px;
  }
  .content details.thinking summary {
    cursor: pointer;
    color: var(--text-faint);
    user-select: none;
    list-style: none;
    padding: 0;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .content details.thinking summary::-webkit-details-marker { display: none; }
  .content details.thinking summary::before { content: "> "; color: var(--accent); }
  .content details.thinking[open] summary::before { content: "v "; color: var(--accent); }
  .content details.thinking .think-body {
    margin-top: 8px;
    white-space: pre-wrap;
    font-family: inherit;
    color: var(--text-dim);
  }
  .msg-actions {
    margin-top: 6px;
    display: flex; gap: 8px;
    opacity: 0; transition: opacity .1s;
  }
  .message:hover .msg-actions { opacity: 1; }
  .msg-actions button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-faint);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
  }
  .msg-actions button:hover { color: var(--text); border-color: var(--border-strong); }

  .empty {
    height: 100%;
    display: grid; place-items: center;
    color: var(--text-faint);
    padding: 40px;
  }
  .empty .mark {
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -1.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 10px;
  }
  .empty .tag { color: var(--text-dim); font-size: 13px; margin-bottom: 24px; }
  .empty .hints { font-size: 12px; color: var(--text-faint); }

  /* ---------- Composer ---------- */
  .composer {
    border-top: 1px solid var(--border);
    padding: 16px 24px 20px;
    background: var(--bg);
  }
  .composer-inner {
    max-width: 780px;
    margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: end;
    transition: border-color .12s;
  }
  .composer-inner:focus-within { border-color: var(--border-strong); }
  .composer textarea {
    background: transparent;
    border: 0;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    max-height: 200px;
    padding: 6px 4px;
    width: 100%;
  }
  .composer textarea:focus { outline: none; }
  .composer .send {
    background: var(--accent);
    color: #1a0f06;
    border: 0;
    border-radius: 8px;
    width: 36px; height: 36px;
    cursor: pointer;
    display: grid; place-items: center;
    font-size: 16px;
    font-weight: 700;
    transition: background .1s;
  }
  .composer .send:hover { background: var(--accent-2); }
  .composer .send:disabled { background: var(--border); color: var(--text-faint); cursor: not-allowed; }
  .composer .send.stop { background: var(--danger); color: #fff; }
  .composer-hint {
    max-width: 780px;
    margin: 8px auto 0;
    font-size: 11px;
    color: var(--text-faint);
    text-align: center;
  }

  /* ---------- Settings drawer ---------- */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    z-index: 10;
  }
  .drawer-backdrop.open { display: block; }
  .drawer {
    position: fixed; top: 0; right: 0;
    width: min(420px, 92vw); height: 100vh;
    background: var(--panel);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform .18s ease-out;
    z-index: 11;
    padding: 20px 24px;
    overflow-y: auto;
  }
  .drawer.open { transform: translateX(0); }
  .drawer h2 { font-size: 15px; margin: 0 0 18px; letter-spacing: -.2px; }
  .drawer label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .drawer textarea, .drawer input[type=number] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    margin-bottom: 18px;
  }
  .drawer textarea { min-height: 110px; resize: vertical; }
  .drawer textarea:focus, .drawer input:focus { outline: none; border-color: var(--accent); }
  .drawer button {
    background: var(--accent); color: #1a0f06;
    border: 0; border-radius: 6px;
    padding: 8px 14px; font-weight: 600;
    cursor: pointer; font-size: 13px;
  }

  @media (max-width: 760px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: fixed; inset: 0 auto 0 0; width: 260px; z-index: 20; transform: translateX(-100%); transition: transform .18s; }
    .sidebar.open { transform: translateX(0); }
    .menu-toggle { display: grid; }
  }
  .menu-toggle {
    display: none;
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 10px; border-radius: 6px; cursor: pointer;
    font-size: 13px; place-items: center;
  }
  @media (min-width: 761px) { .menu-toggle { display: none !important; } }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">E</div>
      <div class="brand-name">Eight<span class="tld">.ly</span> Stick</div>
    </div>
    <button class="new-chat" onclick="App.newChat()">+ New chat</button>
    <div class="chat-list" id="chat-list"></div>
    <div class="sidebar-footer">
      <span><span id="engine-dot" class="status-dot off"></span><span id="engine-status">Checking...</span></span>
      <span id="backend-label"></span>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="menu-toggle" onclick="App.toggleSidebar()">&#9776;</button>
      <select class="model-picker" id="model-picker" onchange="App.onModelChange(event)">
        <option value="">No models loaded</option>
      </select>
      <div class="spacer"></div>
      <button class="icon-btn" onclick="App.openSettings()">Settings</button>
    </header>

    <section class="messages" id="messages">
      <div class="empty" id="empty-state">
        <div class="mark">E.</div>
        <div class="tag">Eight.ly Forge &middot; local, uncensored, yours</div>
        <div class="hints">Pick a model above and start typing.</div>
      </div>
    </section>

    <section class="composer">
      <div class="composer-inner">
        <textarea id="prompt" rows="1" placeholder="Message..." onkeydown="App.onKeydown(event)" oninput="App.autoresize(this)"></textarea>
        <button class="send" id="send-btn" onclick="App.onSendOrStop()">&#9654;</button>
      </div>
      <div class="composer-hint">Enter to send &middot; Shift+Enter for newline</div>
    </section>
  </main>
</div>

<div class="drawer-backdrop" id="drawer-backdrop" onclick="App.closeSettings()"></div>
<aside class="drawer" id="drawer">
  <h2>Settings</h2>
  <label>System prompt (applied to new chats)</label>
  <textarea id="system-prompt" placeholder="Leave blank to use each model's default..."></textarea>
  <label>Temperature (0.0 - 2.0)</label>
  <input type="number" id="temperature" min="0" max="2" step="0.1" value="0.7">
  <button onclick="App.saveSettings()">Save</button>
</aside>

<script>
const App = (() => {
  const state = {
    chats: [],
    activeId: null,
    models: [],
    currentModel: null,
    settings: { systemPrompt: '', temperature: 0.7 },
    streaming: false,
    abortCtrl: null,
  };

  const $ = id => document.getElementById(id);

  async function init() {
    await Promise.all([loadChats(), loadSettings(), loadModels()]);
    if (state.chats.length === 0) newChat();
    else openChat(state.chats[0].id);
  }

  // ---------- Data ----------
  async function loadChats() {
    try { state.chats = await (await fetch('/api/chats')).json(); }
    catch { state.chats = []; }
    renderChatList();
  }

  async function saveChats() {
    try { await fetch('/api/chats', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(state.chats) }); }
    catch {}
  }

  async function loadSettings() {
    try {
      const s = await (await fetch('/api/settings')).json();
      state.settings = { systemPrompt: s.systemPrompt || '', temperature: typeof s.temperature === 'number' ? s.temperature : 0.7 };
    } catch {}
    $('system-prompt').value = state.settings.systemPrompt;
    $('temperature').value = state.settings.temperature;
  }

  async function saveSettings() {
    state.settings.systemPrompt = $('system-prompt').value;
    state.settings.temperature = parseFloat($('temperature').value) || 0.7;
    try { await fetch('/api/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(state.settings) }); } catch {}
    closeSettings();
  }

  async function loadModels() {
    try {
      const r = await fetch('/ollama/api/tags');
      if (!r.ok) throw new Error('api down');
      const data = await r.json();
      state.models = (data.models || []).map(m => m.name).sort();
      $('engine-dot').classList.remove('off');
      $('engine-status').textContent = 'Engine online';
    } catch {
      state.models = [];
      $('engine-dot').classList.add('off');
      $('engine-status').textContent = 'Engine offline';
    }
    renderModels();
  }

  function renderModels() {
    const sel = $('model-picker');
    sel.innerHTML = '';
    if (state.models.length === 0) {
      sel.innerHTML = '<option value="">No models loaded</option>';
      return;
    }
    for (const m of state.models) {
      const opt = document.createElement('option');
      opt.value = m; opt.textContent = m;
      sel.appendChild(opt);
    }
    if (!state.currentModel || !state.models.includes(state.currentModel)) {
      state.currentModel = state.models[0];
    }
    sel.value = state.currentModel;
  }

  function onModelChange(e) { state.currentModel = e.target.value; }

  // ---------- Chat CRUD ----------
  function newChat() {
    const chat = {
      id: Date.now().toString(),
      title: 'New chat',
      model: state.currentModel || '',
      systemPrompt: state.settings.systemPrompt,
      messages: [],
    };
    state.chats.unshift(chat);
    state.activeId = chat.id;
    renderChatList();
    renderMessages();
    saveChats();
    $('prompt').focus();
  }

  function openChat(id) {
    state.activeId = id;
    const chat = state.chats.find(c => c.id === id);
    if (chat && chat.model && state.models.includes(chat.model)) {
      state.currentModel = chat.model;
      $('model-picker').value = chat.model;
    }
    renderChatList();
    renderMessages();
    closeSidebarMobile();
  }

  function deleteChat(id, ev) {
    ev && ev.stopPropagation();
    state.chats = state.chats.filter(c => c.id !== id);
    if (state.activeId === id) state.activeId = state.chats[0]?.id || null;
    renderChatList();
    renderMessages();
    saveChats();
  }

  function currentChat() { return state.chats.find(c => c.id === state.activeId); }

  function renderChatList() {
    const list = $('chat-list');
    list.innerHTML = '';
    for (const c of state.chats) {
      const el = document.createElement('div');
      el.className = 'chat-item' + (c.id === state.activeId ? ' active' : '');
      el.onclick = () => openChat(c.id);
      el.innerHTML = `<span>${escapeHtml(c.title)}</span><span class="del" title="Delete">&times;</span>`;
      el.querySelector('.del').onclick = (e) => deleteChat(c.id, e);
      list.appendChild(el);
    }
  }

  // ---------- Messages rendering ----------
  const EMPTY_STATE_HTML = `
    <div class="empty" id="empty-state">
      <div class="mark">E.</div>
      <div class="tag">Eight.ly Forge &middot; local, uncensored, yours</div>
      <div class="hints">Pick a model above and start typing.</div>
    </div>`;

  // Track which chat + message-count are currently rendered so we can
  // do incremental appends during a stream instead of wiping the DOM on
  // every token. For a 200-message history the old path did O(n) DOM
  // work per token => O(n*t) over the stream, noticeable jank on USB /
  // older CPUs. New path appends exactly the new messages and leaves
  // prior bubbles alone.
  let _renderedChatId = null;
  let _renderedCount = 0;

  function renderMessages() {
    const chat = currentChat();
    const box = $('messages');
    if (!chat || chat.messages.length === 0) {
      box.innerHTML = EMPTY_STATE_HTML;
      _renderedChatId = null; _renderedCount = 0;
      return;
    }
    const sameChat = (chat.id === _renderedChatId);
    let wrap = $('message-wrap');
    if (!sameChat || !wrap) {
      // Full paint: new chat or first time.
      box.innerHTML = '<div class="message-wrap" id="message-wrap"></div>';
      wrap = $('message-wrap');
      for (const m of chat.messages) wrap.appendChild(renderMessage(m));
    } else if (chat.messages.length > _renderedCount) {
      // Incremental: only append messages that appeared since last render.
      for (let i = _renderedCount; i < chat.messages.length; i++) {
        wrap.appendChild(renderMessage(chat.messages[i]));
      }
    } else if (chat.messages.length < _renderedCount) {
      // Messages were deleted -> fall back to full paint.
      box.innerHTML = '<div class="message-wrap" id="message-wrap"></div>';
      wrap = $('message-wrap');
      for (const m of chat.messages) wrap.appendChild(renderMessage(m));
    }
    _renderedChatId = chat.id;
    _renderedCount = chat.messages.length;
    scrollToBottom();
  }

  function renderMessage(m) {
    const wrap = document.createElement('div');
    wrap.className = 'message';
    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + m.role;
    avatar.textContent = m.role === 'user' ? 'U' : 'E';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const label = document.createElement('div');
    label.className = 'role-label';
    label.textContent = m.role === 'user' ? 'You' : 'Assistant';
    const content = document.createElement('div');
    content.className = 'content';
    content.innerHTML = renderMarkdown(m.content || '');
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    const copyBtn = document.createElement('button');
    copyBtn.textContent = 'Copy';
    copyBtn.onclick = () => { navigator.clipboard.writeText(m.content || ''); copyBtn.textContent = 'Copied'; setTimeout(() => copyBtn.textContent = 'Copy', 1500); };
    actions.appendChild(copyBtn);
    bubble.appendChild(label); bubble.appendChild(content); bubble.appendChild(actions);
    wrap.appendChild(avatar); wrap.appendChild(bubble);
    return wrap;
  }

  function renderMarkdown(text) {
    // Split out reasoning/thinking blocks (Gemma 4 uses <|channel>thought ... <channel|>answer,
    // DeepSeek/Qwen use <think>...</think>). Render thinking into a collapsible panel.
    const segments = splitReasoning(text);
    return segments.map(seg => {
      if (seg.type === 'think') {
        const openAttr = seg.closed ? '' : ' open';
        return `<details class="thinking"${openAttr}><summary>Thinking</summary><div class="think-body">${renderMd(seg.text)}</div></details>`;
      }
      return renderMd(seg.text);
    }).join('');
  }

  function splitReasoning(text) {
    const out = [];
    let i = 0;
    while (i < text.length) {
      // Gemma 4 pattern: <|channel>thought ... <channel|>
      const g4Start = text.indexOf('<|channel>thought', i);
      const thinkStart = text.indexOf('<think>', i);
      // Pick the earliest pattern present
      let startIdx = -1, startLen = 0, endTag = '';
      if (g4Start !== -1 && (thinkStart === -1 || g4Start < thinkStart)) {
        startIdx = g4Start; startLen = '<|channel>thought'.length; endTag = '<channel|>';
      } else if (thinkStart !== -1) {
        startIdx = thinkStart; startLen = '<think>'.length; endTag = '</think>';
      }
      if (startIdx === -1) {
        if (i < text.length) out.push({ type: 'text', text: text.substring(i) });
        break;
      }
      if (startIdx > i) out.push({ type: 'text', text: text.substring(i, startIdx) });
      const afterOpen = startIdx + startLen;
      const endIdx = text.indexOf(endTag, afterOpen);
      if (endIdx === -1) {
        // Still thinking (stream in progress)
        out.push({ type: 'think', text: text.substring(afterOpen), closed: false });
        i = text.length;
      } else {
        out.push({ type: 'think', text: text.substring(afterOpen, endIdx), closed: true });
        i = endIdx + endTag.length;
      }
    }
    return out;
  }

  function renderMd(text) {
    // Pull fenced code out first so its body isn't mangled by other replacements.
    const blocks = [];
    let html = escapeHtml(text).replace(/```([a-zA-Z0-9_+-]*)\n?([\s\S]*?)```/g, (_, _lang, code) => {
      blocks.push(`<pre><code>${code.replace(/\n$/, '')}</code></pre>`);
      return `\u0000FENCE${blocks.length - 1}\u0000`;
    });

    // Inline code
    html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');

    // Headings (#, ##, ### at start of line)
    html = html.replace(/(^|\n)(#{1,3})\s+([^\n]+)/g, (_, nl, hashes, content) => {
      const level = hashes.length;
      return `${nl}<h${level + 2}>${content.trim()}</h${level + 2}>`;
    });

    // Bold + italic. Bold first (matches longer), then italic on what remains.
    html = html.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/__([^_\n]+)__/g,     '<strong>$1</strong>');
    html = html.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
    html = html.replace(/(^|[^_])_([^_\n]+)_(?!_)/g,     '$1<em>$2</em>');

    // Simple list handling: contiguous lines starting with `- ` / `* ` become <ul>,
    // lines starting with `N. ` become <ol>. Blank line ends the list.
    html = html.replace(/((?:^|\n)(?:[-*]\s+[^\n]+(?:\n[-*]\s+[^\n]+)*))/g, (m) => {
      const items = m.trim().split(/\n[-*]\s+/).map(s => s.replace(/^[-*]\s+/, '').trim()).filter(Boolean);
      return '\n<ul>' + items.map(i => `<li>${i}</li>`).join('') + '</ul>';
    });
    html = html.replace(/((?:^|\n)(?:\d+\.\s+[^\n]+(?:\n\d+\.\s+[^\n]+)*))/g, (m) => {
      const items = m.trim().split(/\n\d+\.\s+/).map(s => s.replace(/^\d+\.\s+/, '').trim()).filter(Boolean);
      return '\n<ol>' + items.map(i => `<li>${i}</li>`).join('') + '</ol>';
    });

    // Put code blocks back
    html = html.replace(/\u0000FENCE(\d+)\u0000/g, (_, i) => blocks[+i]);

    return html;
  }

  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

  function scrollToBottom() {
    const box = $('messages');
    box.scrollTop = box.scrollHeight;
  }

  // ---------- Sending ----------
  function autoresize(ta) { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 200) + 'px'; }
  function onKeydown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onSendOrStop(); } }

  function onSendOrStop() { state.streaming ? stopStream() : sendMessage(); }

  async function sendMessage() {
    const ta = $('prompt');
    const text = ta.value.trim();
    if (!text || !state.currentModel) return;
    const chat = currentChat();
    if (!chat) return;
    if (!chat.model) chat.model = state.currentModel;
    chat.messages.push({ role: 'user', content: text });
    if (chat.messages.length === 1) { chat.title = text.length > 48 ? text.slice(0, 48) + '...' : text; renderChatList(); }
    ta.value = ''; autoresize(ta);
    renderMessages();
    saveChats();

    const assistantMsg = { role: 'assistant', content: '' };
    chat.messages.push(assistantMsg);
    renderMessages();
    const wrap = $('message-wrap');
    const lastContent = wrap.lastElementChild.querySelector('.content');

    state.streaming = true;
    setSendBtn(true);
    state.abortCtrl = new AbortController();

    const msgs = [];
    const sys = chat.systemPrompt || state.settings.systemPrompt;
    if (sys) msgs.push({ role: 'system', content: sys });
    // Exclude empty assistant placeholder when sending
    for (const m of chat.messages) {
      if (m === assistantMsg) break;
      msgs.push({ role: m.role, content: m.content });
    }

    try {
      const resp = await fetch('/ollama/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: chat.model, messages: msgs, stream: true, options: { temperature: state.settings.temperature } }),
        signal: state.abortCtrl.signal,
      });
      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      // Throttle re-renders to ~30 fps. Per-token innerHTML re-parses the
      // whole markdown string; for a 2000-token answer that is O(n^2)
      // work. Coalescing to frames keeps the typewriter feel without the
      // CPU burn.
      let pendingRender = false;
      const flush = () => {
        pendingRender = false;
        lastContent.innerHTML = renderMarkdown(assistantMsg.content);
        scrollToBottom();
      };
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.trim()) continue;
          try {
            const j = JSON.parse(line);
            if (j.message && j.message.content) {
              assistantMsg.content += j.message.content;
              if (!pendingRender) {
                pendingRender = true;
                requestAnimationFrame(flush);
              }
            }
          } catch {}
        }
      }
      // Final render on stream end so the last few tokens never get stuck in
      // the "pending" coalesce window.
      lastContent.innerHTML = renderMarkdown(assistantMsg.content);
      scrollToBottom();
    } catch (e) {
      if (e.name !== 'AbortError') {
        assistantMsg.content += `\n\n[error: ${e.message}]`;
        lastContent.innerHTML = renderMarkdown(assistantMsg.content);
      }
    } finally {
      state.streaming = false;
      setSendBtn(false);
      saveChats();
    }
  }

  function stopStream() { state.abortCtrl && state.abortCtrl.abort(); }

  function setSendBtn(streaming) {
    const b = $('send-btn');
    if (streaming) { b.classList.add('stop'); b.innerHTML = '&#9632;'; }
    else { b.classList.remove('stop'); b.innerHTML = '&#9654;'; }
  }

  // ---------- Drawers & toggles ----------
  function openSettings() { $('drawer').classList.add('open'); $('drawer-backdrop').classList.add('open'); }
  function closeSettings() { $('drawer').classList.remove('open'); $('drawer-backdrop').classList.remove('open'); }
  function toggleSidebar() { $('sidebar').classList.toggle('open'); }
  function closeSidebarMobile() { if (window.innerWidth < 761) $('sidebar').classList.remove('open'); }

  init();

  return { newChat, openChat, deleteChat, onModelChange, onKeydown, onSendOrStop, autoresize, openSettings, closeSettings, saveSettings, toggleSidebar };
})();
</script>
</body>
</html>
